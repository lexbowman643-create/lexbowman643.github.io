<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Random Vibe Picker</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            text-align: center;
            padding: 50px;
        }

        .nav {
            margin-bottom: 25px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            padding: 8px 12px;
            background: #333;
            border-radius: 6px;
        }

        .nav a:hover {
            background: #555;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #bbb;
        }

        .card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            display: inline-block;
            width: 320px;
            margin-top: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .label {
            font-size: 14px;
            color: #aaa;
            margin-top: 15px;
        }

        .result {
            font-size: 20px;
            margin-top: 5px;
            font-weight: bold;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <a href="index.html">← Home</a>
    <a href="scratch.html">Scratch Page</a>
</div>

<h1>🎮 Random Vibe Picker</h1>
<p>Find your game, music, and car vibe instantly</p>

<div class="card">

    <div class="label">Game</div>
    <div class="result" id="game">---</div>

    <div class="label">Music</div>
    <div class="result" id="music">---</div>

    <div class="label">Car Vibe</div>
    <div class="result" id="car">---</div>

    <button onclick="generate()">Generate Vibe</button>

</div>

<script>
    const games = [
        "Elden Ring",
        "Baldur's Gate 3",
        "Minecraft",
        "Terraria",
        "Phasmophobia",
        "Legend of Zelda"
    ];

    const music = [
        "Blink-182",
        "My Chemical Romance",
        "All Time Low",
        "Yellowcard",
        "Simple Plan",
        "Mayday Parade",
        "The Red Jumpsuit Apparatus"
    ];

    const cars = [
        "Porsche 944",
        "90s JDM Build",
        "Toyota Supra Mk3",
        "Off-road Truck",
        "Classic BMW Coupe"
    ];

    function generate() {
        document.getElementById("game").innerText =
            games[Math.floor(Math.random() * games.length)];

        document.getElementById("music").innerText =
            music[Math.floor(Math.random() * music.length)];

        document.getElementById("car").innerText =
            cars[Math.floor(Math.random() * cars.length)];
    }
</script>

</body>
</html>
